<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Friends Boutique | Admin Suite</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=Cinzel:wght@400;600&display=swap" rel="stylesheet"/>
<style>
/* --- MINIMALIST DESIGN SYSTEM --- */
*{box-sizing:border-box;margin:0;padding:0}
:root{--p:#e8c9a0;--a:#c9a070;--bg:#0d0d0d;--card:#131313;--border:#1e1e1e}
body{font-family:'Cormorant Garamond',serif;background:var(--bg);color:#e0d8cc;min-height:100vh;overflow-x:hidden}

/* SCROLLBAR */
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:#0d0d0d}
::-webkit-scrollbar-thumb{background:var(--p);border-radius:2px}

/* HEADER */
#hdr{position:fixed;top:0;left:0;right:0;z-index:200;background:rgba(10,10,10,0.95);backdrop-filter:blur(10px);border-bottom:1px solid var(--border)}
.hdr-inner{max-width:1200px;margin:0 auto;height:60px;display:flex;align-items:center;justify-content:space-between;padding:0 20px}
.logo{font-family:'Cinzel',serif;font-size:16px;letter-spacing:4px;color:var(--p);cursor:pointer;text-transform:uppercase}
.nav-pills{display:flex;gap:12px}
.pill{font-family:'Cinzel',serif;font-size:9px;letter-spacing:2px;color:#888;cursor:pointer;padding:6px 12px;border:1px solid #222;border-radius:20px;transition:0.3s;text-transform:uppercase}
.pill:hover, .pill.active{color:var(--p);border-color:var(--p)}
.pill.admin-only{display:none;border-color:var(--a);color:var(--a)}

/* PAGE CONTAINERS */
.pg{display:none;padding:100px 20px 40px;max-width:1000px;margin:0 auto;animation:fUp 0.5s ease forwards}
.pg.active{display:block}
@keyframes fUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* DASHBOARD COMPONENTS */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit, minmax(200px, 1fr));gap:20px;margin-bottom:40px}
.stat-card{background:var(--card);border:1px solid var(--border);padding:25px;text-align:center}
.stat-val{font-family:'Cinzel',serif;font-size:24px;color:var(--p);margin-bottom:5px}
.stat-lbl{font-size:10px;text-transform:uppercase;letter-spacing:2px;color:#555}

/* ADMIN TABS */
.adm-header{display:flex;border-bottom:1px solid var(--border);margin-bottom:30px}
.adm-tab-btn{background:none;border:none;color:#555;font-family:'Cinzel',serif;font-size:10px;padding:15px 25px;cursor:pointer;letter-spacing:2px}
.adm-tab-btn.active{color:var(--p);border-bottom:2px solid var(--p)}
.adm-card{background:var(--card);border:1px solid var(--border);padding:20px;margin-bottom:15px;position:relative}

/* FORMS */
.field{margin-bottom:20px}
.field label{display:block;font-family:'Cinzel',serif;font-size:9px;letter-spacing:1px;color:#666;margin-bottom:8px;text-transform:uppercase}
.field input, .field select, .field textarea{width:100%;background:#0a0a0a;border:1px solid #222;padding:12px;color:#fff;font-family:inherit;outline:none;transition:0.3s}
.field input:focus{border-color:var(--p)}

.btn{font-family:'Cinzel',serif;font-size:10px;letter-spacing:2px;padding:14px 28px;cursor:pointer;border:none;text-transform:uppercase;transition:0.3s}
.btn-p{background:var(--p);color:#0d0d0d}
.btn-p:hover{background:var(--a)}

/* MODALS */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.9);z-index:1000;align-items:center;justify-content:center;padding:20px}
.modal{background:#0a0a0a;border:1px solid var(--border);width:100%;max-width:400px;padding:40px}
.captcha-box{background:#161616;padding:15px;text-align:center;font-family:'Cinzel',serif;color:var(--p);letter-spacing:4px;margin-bottom:20px}

/* TOAST */
#toast-container{position:fixed;bottom:20px;right:20px;z-index:2000}
.toast{background:#111;border:1px solid var(--p);color:var(--p);padding:12px 24px;margin-top:10px;font-size:13px;animation:fIn 0.3s ease}
@keyframes fIn{from{opacity:0;transform:translateX(50px)}to{opacity:1;transform:translateX(0)}}
</style>
</head>
<body>

<header id="hdr">
  <div class="hdr-inner">
    <div class="logo" id="store-name-display" onclick="showPg('home')">Friends Boutique</div>
    <div class="nav-pills">
      <div class="pill active" onclick="showPg('home')">Shop</div>
      <div id="adm-pill" class="pill admin-only" onclick="showPg('admin')">Admin</div>
      <div id="login-pill" class="pill" onclick="openLogin()">Login</div>
      <div id="logout-pill" class="pill" style="display:none" onclick="logout()">Logout</div>
    </div>
  </div>
</header>

<div id="toast-container"></div>

<div id="pg-home" class="pg active">
  <h2 id="home-title" style="font-family:'Cinzel',serif; margin-bottom:15px">Current Collection</h2>
  <p id="home-desc" style="color:#888; margin-bottom:30px">Refined simplicity for the modern era.</p>
  <div class="adm-card" style="text-align:center; padding:60px;">
      <button class="btn btn-p" onclick="openCheckout()">Checkout Demo</button>
  </div>
</div>

<div id="pg-admin" class="pg">
    <h2 style="font-family:'Cinzel',serif; margin-bottom:30px">Admin Suite</h2>
    
    <div class="stat-grid">
        <div class="stat-card">
            <div class="stat-val" id="stat-revenue">₹0</div>
            <div class="stat-lbl">Revenue</div>
        </div>
        <div class="stat-card">
            <div class="stat-val" id="stat-orders">0</div>
            <div class="stat-lbl">Orders</div>
        </div>
        <div class="stat-card">
            <div class="stat-val" id="stat-aov">₹0</div>
            <div class="stat-lbl">Avg. Order Value</div>
        </div>
    </div>

    <div class="adm-header">
        <button class="adm-tab-btn active" onclick="setAdmTab('orders')">Orders</button>
        <button class="adm-tab-btn" onclick="setAdmTab('customize')">Customise Store</button>
    </div>

    <div id="adm-orders" class="adm-content active">
        <div id="order-list"></div>
    </div>

    <div id="adm-customize" class="adm-content" style="display:none">
        <div class="adm-card">
            <h4 style="font-family:'Cinzel',serif; margin-bottom:20px; font-size:12px">Branding & Meta</h4>
            <div class="field">
                <label>Store Name</label>
                <input type="text" id="set-store-name" value="Friends Boutique">
            </div>
            <div class="field">
                <label>Currency Symbol</label>
                <input type="text" id="set-currency" value="₹">
            </div>
            <div class="field">
                <label>Collection Title</label>
                <input type="text" id="set-home-title" value="Current Collection">
            </div>
            <div class="field">
                <label>Store Description</label>
                <textarea id="set-home-desc" rows="3">Refined simplicity for the modern era.</textarea>
            </div>
            <button class="btn btn-p" onclick="saveSettings()">Save Changes</button>
        </div>
    </div>
</div>

<div id="login-modal" class="overlay">
    <div class="modal">
        <h3 style="font-family:'Cinzel',serif; color:var(--p); text-align:center; margin-bottom:25px">Admin Login</h3>
        <div class="field">
            <label>Email or Phone</label>
            <input type="text" id="log-id">
        </div>
        <div class="field">
            <label>Password</label>
            <input type="password" id="log-pass">
        </div>
        <div class="captcha-box" id="captcha-display"></div>
        <div class="field">
            <label>Captcha Result</label>
            <input type="text" id="log-captcha">
        </div>
        <button class="btn btn-p" style="width:100%" onclick="validateLogin()">Verify</button>
        <button class="btn" style="width:100%; color:#555; margin-top:10px" onclick="closeLogin()">Cancel</button>
    </div>
</div>

<div id="checkout-modal" class="overlay">
    <div class="modal">
        <h3 style="font-family:'Cinzel',serif; color:var(--p); margin-bottom:20px">Checkout</h3>
        <div class="field"><label>Name</label><input type="text" id="co-name"></div>
        <div class="field"><label>Email</label><input type="email" id="co-email"></div>
        <div class="field"><label>Phone</label><input type="tel" id="co-phone"></div>
        <div class="field"><label>Demo Amount (Total)</label><input type="number" id="co-total" value="2500"></div>
        <button class="btn btn-p" style="width:100%" onclick="processOrder()">Complete</button>
        <button class="btn" style="width:100%; color:#555" onclick="closeModal()">Close</button>
    </div>
</div>

<script>
// --- CORE DATA ---
const ADMIN_EMAIL = "admin@friendsboutique.com";
const ADMIN_PW = "fb_AdMin_#2026_Secure";
let captchaAnswer = 0;
let storeSettings = {
    name: "Friends Boutique",
    currency: "₹",
    title: "Current Collection",
    desc: "Refined simplicity for the modern era."
};

let orders = [
    { id: 'FB-8821', name: 'John Smith', email: 'john@example.com', phone: '9876543210', status: 'Pending', total: 4500 },
    { id: 'FB-8822', name: 'Sarah Wu', email: 'sarah.wu@web.com', phone: '8887771234', status: 'Shipped', total: 12000 }
];

// --- NAVIGATION & UI ---
function showPg(id) {
    document.querySelectorAll('.pg').forEach(p => p.classList.remove('active'));
    document.getElementById('pg-' + id).classList.add('active');
    if(id === 'admin') updateAnalytics();
}

function toast(msg) {
    const container = document.getElementById('toast-container');
    const t = document.createElement('div');
    t.className = 'toast';
    t.innerText = msg;
    container.appendChild(t);
    setTimeout(() => t.remove(), 3000);
}

// --- AUTH ---
function openLogin() {
    const a = Math.floor(Math.random() * 10);
    const b = Math.floor(Math.random() * 10);
    captchaAnswer = a + b;
    document.getElementById('captcha-display').innerText = `${a} + ${b} = ?`;
    document.getElementById('login-modal').style.display = 'flex';
}

function closeLogin() { document.getElementById('login-modal').style.display = 'none'; }

function validateLogin() {
    const id = document.getElementById('log-id').value;
    const pass = document.getElementById('log-pass').value;
    const userCap = parseInt(document.getElementById('log-captcha').value);

    if (userCap !== captchaAnswer) {
        toast("Human verification failed.");
        openLogin();
        return;
    }

    if (id.toLowerCase() === ADMIN_EMAIL.toLowerCase() && pass === ADMIN_PW) {
        document.getElementById('adm-pill').style.display = 'block';
        document.getElementById('logout-pill').style.display = 'block';
        document.getElementById('login-pill').style.display = 'none';
        closeLogin();
        showPg('admin');
        renderOrders();
    } else {
        toast("Verified as Guest User.");
        document.getElementById('logout-pill').style.display = 'block';
        document.getElementById('login-pill').style.display = 'none';
        closeLogin();
    }
}

function logout() {
    location.reload(); // Hard reset for security
}

// --- CUSTOMIZATION ---
function saveSettings() {
    storeSettings.name = document.getElementById('set-store-name').value;
    storeSettings.currency = document.getElementById('set-currency').value;
    storeSettings.title = document.getElementById('set-home-title').value;
    storeSettings.desc = document.getElementById('set-home-desc').value;

    // Apply Live
    document.getElementById('store-name-display').innerText = storeSettings.name;
    document.getElementById('home-title').innerText = storeSettings.title;
    document.getElementById('home-desc').innerText = storeSettings.desc;
    
    updateAnalytics(); // Refresh currency displays
    toast("Store customization saved.");
}

// --- ORDERS & ANALYTICS ---
function openCheckout() { document.getElementById('checkout-modal').style.display = 'flex'; }
function closeModal() { document.getElementById('checkout-modal').style.display = 'none'; }

function processOrder() {
    const name = document.getElementById('co-name').value;
    const email = document.getElementById('co-email').value;
    const phone = document.getElementById('co-phone').value;
    const total = parseFloat(document.getElementById('co-total').value);

    if (!name || !/^\d{10}$/.test(phone)) return toast("Check name & 10-digit phone");

    orders.unshift({
        id: 'FB-' + Math.floor(1000 + Math.random() * 9000),
        name, email, phone, total, status: 'Pending'
    });

    toast("Order successful.");
    closeModal();
    renderOrders();
    updateAnalytics();
}

function updateAnalytics() {
    const totalRev = orders.reduce((sum, o) => sum + o.total, 0);
    const count = orders.length;
    const aov = count > 0 ? (totalRev / count) : 0;

    document.getElementById('stat-revenue').innerText = `${storeSettings.currency}${totalRev.toLocaleString()}`;
    document.getElementById('stat-orders').innerText = count;
    document.getElementById('stat-aov').innerText = `${storeSettings.currency}${Math.round(aov).toLocaleString()}`;
}

function setAdmTab(tab) {
    document.querySelectorAll('.adm-tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.adm-content').forEach(c => c.style.display = 'none');
    event.target.classList.add('active');
    document.getElementById('adm-' + tab).style.display = 'block';
}

function renderOrders() {
    const list = document.getElementById('order-list');
    list.innerHTML = orders.map(o => `
        <div class="adm-card">
            <div style="display:flex; justify-content:space-between; margin-bottom:10px">
                <span style="font-family:'Cinzel',serif; color:var(--p)">${o.id}</span>
                <span style="font-size:12px">${storeSettings.currency}${o.total}</span>
            </div>
            <div style="font-size:14px; color:#888; line-height:1.6">
                <strong>Customer:</strong> ${o.name}<br>
                <strong>Contact:</strong> ${o.email} | ${o.phone}<br>
                <strong>Status:</strong> <span style="color:var(--p)">${o.status}</span>
            </div>
            <select style="margin-top:15px; padding:8px; width:100%; background:#0a0a0a; color:#fff; border:1px solid #333" onchange="updateStatus('${o.id}', this.value)">
                <option value="Pending" ${o.status==='Pending'?'selected':''}>Pending</option>
                <option value="Shipped" ${o.status==='Shipped'?'selected':''}>Shipped</option>
                <option value="Delivered" ${o.status==='Delivered'?'selected':''}>Delivered</option>
            </select>
        </div>
    `).join('');
}

function updateStatus(id, newStatus) {
    const order = orders.find(o => o.id === id);
    if(order) {
        order.status = newStatus;
        toast(`Order ${id} updated.`);
        renderOrders();
    }
}
</script>
</body>
</html>
